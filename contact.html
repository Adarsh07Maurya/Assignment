<form>
  <label>Full Name: <input type="text" required></label><br>
  <label>Email: <input type="email" required></label><br>
  <label>Phone: <input type="tel" pattern="[0-9]{10}" required></label><br>
  <label>Date: <input type="date"></label><br>
  <label>Choose Plan:
    <select>
      <option>Basic</option>
      <option>Pro</option>
      <option>Enterprise</option>
    </select>
  </label><br>
  <label>Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
  </label><br>
  <label>Interests:
    <input type="checkbox"> Tech
    <input type="checkbox"> Business
  </label><br>
  <label>Message: <textarea></textarea></label><br>
  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
</form>
